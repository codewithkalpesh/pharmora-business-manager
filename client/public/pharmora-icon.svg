<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>
  <!-- Background circle with smooth corners -->
  <rect width="440" height="440" x="36" y="36" rx="96" fill="url(#greenGrad)"/>
  <!-- Pill Icon -->
  <g transform="translate(256, 256) rotate(-45)">
    <!-- Pill Capsule -->
    <rect x="-45" y="-110" width="90" height="220" rx="45" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Pill Divider Line -->
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
  </g>
</svg>
